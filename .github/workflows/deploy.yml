name: CI/CD Deploy

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'dropsandgrinds' }}
  IMAGE_NAME: dropsandgrinds-backend
  ACTIONS_FAILURE_WEBHOOK_URL: ${{ secrets.ACTIONS_FAILURE_WEBHOOK_URL }}

jobs:
  test:
    name: Go Test And Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Notify failure
        if: failure() && env.ACTIONS_FAILURE_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"DropsAndGrinds CI failed in ${GITHUB_JOB}: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "${ACTIONS_FAILURE_WEBHOOK_URL}"

  trivy:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ${IMAGE_NAME}:${GITHUB_SHA} .

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Notify failure
        if: failure() && env.ACTIONS_FAILURE_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"DropsAndGrinds Trivy scan failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "${ACTIONS_FAILURE_WEBHOOK_URL}"

  ecr:
    name: Docker Build And Push To AWS ECR
    runs-on: ubuntu-latest
    needs: trivy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-uri: ${{ steps.meta.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          echo "image-uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "latest-uri=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:latest" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image-uri }}
            ${{ steps.meta.outputs.latest-uri }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify failure
        if: failure() && env.ACTIONS_FAILURE_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"DropsAndGrinds ECR push failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "${ACTIONS_FAILURE_WEBHOOK_URL}"

  watchtower:
    name: Watchtower Zero Downtime Restart
    runs-on: ubuntu-latest
    needs: ecr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      WATCHTOWER_HTTP_API_URL: ${{ secrets.WATCHTOWER_HTTP_API_URL }}
      WATCHTOWER_HTTP_API_TOKEN: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      DEPLOY_HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL }}
    steps:
      - name: Validate deployment trigger
        run: |
          if [ -z "${WATCHTOWER_HTTP_API_URL}" ] && [ -z "${EC2_HOST}" ]; then
            echo "Set WATCHTOWER_HTTP_API_URL/WATCHTOWER_HTTP_API_TOKEN or EC2_HOST/EC2_USER/EC2_SSH_KEY."
            exit 1
          fi

      - name: Trigger Watchtower HTTP API
        run: |
          if [ -z "${WATCHTOWER_HTTP_API_URL}" ] || [ -z "${WATCHTOWER_HTTP_API_TOKEN}" ]; then
            echo "Watchtower HTTP API secrets not set; skipping HTTP trigger."
            exit 0
          fi
          curl -fsS -H "Authorization: Bearer ${WATCHTOWER_HTTP_API_TOKEN}" \
            -X POST "${WATCHTOWER_HTTP_API_URL}/v1/update"

      - name: Trigger Watchtower over SSH
        run: |
          if [ -n "${WATCHTOWER_HTTP_API_URL}" ] || [ -z "${EC2_HOST}" ]; then
            echo "SSH fallback not required or EC2_HOST not set; skipping SSH trigger."
            exit 0
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "${EC2_SSH_KEY}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" \
            'docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v ~/.docker/config.json:/config.json containrrr/watchtower:1.7.1 --run-once --label-enable --rolling-restart --cleanup'

      - name: Verify deployment health
        if: env.DEPLOY_HEALTH_URL != ''
        run: curl -fsS --retry 10 --retry-delay 6 "${DEPLOY_HEALTH_URL}/health"

      - name: Notify failure
        if: failure() && env.ACTIONS_FAILURE_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"DropsAndGrinds Watchtower deploy failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "${ACTIONS_FAILURE_WEBHOOK_URL}"
