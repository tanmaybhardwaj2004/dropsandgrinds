server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy auth requests to backend
    location /auth/ {
        proxy_pass http://backend:8080/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy health and metrics
    location /health {
        proxy_pass http://backend:8080/health;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://backend:8080/metrics;
        proxy_set_header Host $host;
    }

    location /api/health {
        proxy_pass http://backend:8080/health;
        proxy_set_header Host $host;
    }

    # Swagger docs
    location /swagger/ {
        proxy_pass http://backend:8080/swagger/;
        proxy_set_header Host $host;
    }

    # Image proxy for Steam (bypass hotlink protection)
    location /img/steam/ {
        proxy_pass https://shared.cloudflare.steamstatic.com/;
        proxy_set_header Referer "https://store.steampowered.com/";
        proxy_set_header User-Agent "Mozilla/5.0";
        proxy_hide_header Referer;
        proxy_hide_header User-Agent;
        proxy_cache_valid 200 1d;
    }

    # Image proxy for GOG
    location /img/gog/ {
        proxy_pass https://images.gog-statics.com/;
        proxy_set_header Referer "https://www.gog.com/";
        proxy_set_header User-Agent "Mozilla/5.0";
        proxy_hide_header Referer;
        proxy_hide_header User-Agent;
        proxy_cache_valid 200 1d;
    }

    # Image proxy for Epic
    location /img/epic/ {
        proxy_pass https://cdn2.unrealengine.com/;
        proxy_set_header Referer "https://store.epicgames.com/";
        proxy_set_header User-Agent "Mozilla/5.0";
        proxy_hide_header Referer;
        proxy_hide_header User-Agent;
        proxy_cache_valid 200 1d;
    }
}
