<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DropsAndGrinds</title>
    <meta name="theme-color" content="#6366f1">
    <link rel="stylesheet" href="css/modern-theme.css">
    <link rel="stylesheet" href="css/auth-modern.css">
</head>
<body class="auth-page">
    <div class="auth-card animate-scaleIn">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <div class="auth-logo-icon">🎮</div>
                <h1>DropsAndGrinds</h1>
                <p>Smart deal tracking for Indian gamers</p>
            </a>
        </div>

        <!-- Header -->
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to track deals and manage your wishlist</p>
        </div>
        
        <!-- Error Alert -->
        <div id="auth-error" class="auth-error hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="error-message">Invalid email or password</span>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="you@example.com" autocomplete="email">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-field">
                    <input type="password" id="password" name="password" class="form-input" required placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword()" title="Show password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div class="auth-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary auth-submit" id="login-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: var(--space-2);"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Sign In
            </button>
        </form>

        <!-- Social Login -->
        <div class="social-divider">
            <span>Or continue with</span>
        </div>
        
        <div class="social-buttons">
            <button class="social-btn" onclick="socialLogin('google')" title="Sign in with Google">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google
            </button>
            <button class="social-btn" onclick="socialLogin('steam')" title="Sign in with Steam">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15h-2v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3l-.5 3H13v6.95c5.05-.5 9-4.76 9-9.95 0-5.52-4.48-10-10-10z"/></svg>
                Steam
            </button>
        </div>

        <!-- Footer -->
        <p class="auth-footer">
            Don't have an account? <a href="register.html">Create one</a>
        </p>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        }
        
        function socialLogin(provider) {
            // Placeholder for social login
            alert(`${provider} login coming soon!`);
        }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
