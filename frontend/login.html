<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DropsAndGrinds</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <header class="app-header">
        <div class="logo"><a href="index.html">DropsAndGrinds</a></div>
    </header>

    <main class="container auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Log in to track your game deals</p>
            
            <div id="auth-error" class="alert error hidden"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="player@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="********">
                </div>
                <button type="submit" class="btn btn-primary full-width" id="login-btn">Log In</button>
            </form>
            
            <p class="auth-footer">Don't have an account? <a href="register.html">Sign Up</a></p>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
