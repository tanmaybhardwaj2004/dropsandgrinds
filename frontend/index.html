<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropsAndGrinds - Smart Game Deal Tracker</title>
    <meta name="description" content="Track game deals across multiple platforms with India-specific pricing, multi-source review scores, and an intelligent bundle breaker.">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/consent.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">DropsAndGrinds</div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Deals</a></li>
                <li><a href="library.html">Library</a></li>
                <li><a href="wishlist.html">Wishlist</a></li>
                <li><a href="savings.html">Savings</a></li>
            </ul>
        </nav>
        <div class="actions">
            <!-- Search Icon / Avatar placeholder -->
            <button class="btn btn-primary" id="auth-btn" onclick="window.location.href='login.html'">Login</button>
        </div>
    </header>

    <main class="container">
        <!-- Hero Section / Live sale banner -->
        <section id="live-sale-banner" class="banner" style="display: none;">
            <h2 id="sale-banner-title">Loading...</h2>
            <p id="sale-banner-message">Loading sale information...</p>
        </section>

        <!-- Deals For You Section (Phase 4) -->
        <section id="deals-for-you-section" style="display: none;">
            <div class="section-header">
                <div>
                    <h2 class="section-title">Deals For You</h2>
                    <p class="section-subtitle">Personalized based on your wishlist and preferences</p>
                </div>
                <a href="#" class="view-all-btn">View All →</a>
            </div>
            <div id="deals-for-you-container"></div>
        </section>

        <div class="layout-wrapper">
            <!-- Glassmorphism Sidebar Filters -->
            <aside class="sidebar">
                <h3>Discover Filters</h3>
                
                <div class="filter-group">
                    <input type="text" id="search-input" placeholder="Search games..." class="search-box">
                </div>

                <div class="filter-group" id="store-filters">
                    <label>Store Integrations</label>
                    <div class="filter-item">
                        <input type="checkbox" id="store-steam" value="Steam" checked>
                        <label for="store-steam">Steam</label>
                    </div>
                    <div class="filter-item">
                        <input type="checkbox" id="store-epic" value="Epic Games" checked>
                        <label for="store-epic">Epic Games</label>
                    </div>
                    <div class="filter-item">
                        <input type="checkbox" id="store-gog" value="GOG" checked>
                        <label for="store-gog">GOG</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="price-slider">Max Price (₹)</label>
                    <input type="range" id="price-slider" title="Max Price Slider" min="0" max="5000" value="5000" class="full-width">
                    <div class="price-display-text" id="price-display">₹5000</div>
                </div>

                <div class="filter-group">
                    <div class="filter-item">
                        <input type="checkbox" id="hide-owned" value="hide-owned">
                        <label for="hide-owned">Hide owned games</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>My Wishlist</label>
                    <div id="wishlist-preview" class="wishlist-preview">Log in to view your wishlist.</div>
                </div>
            </aside>

            <!-- Deals Grid (Masonry) -->
            <section class="deals-grid" id="deals-container">
                <!-- JS will populate these cards -->
            </section>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/consent.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
