<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Dashboard - DropsAndGrinds</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/savings.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">DropsAndGrinds</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">Deals</a>
                <a href="library.html" class="nav-link">Library</a>
                <a href="wishlist.html" class="nav-link">Wishlist</a>
                <a href="savings.html" class="nav-link active">Savings</a>
            </nav>
            <div class="auth-buttons">
                <button id="login-btn" class="btn btn-primary">Login</button>
                <button id="logout-btn" class="btn btn-secondary" style="display: none;">Logout</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="savings-section">
            <h2 class="section-title">Your Savings</h2>
            <p class="section-subtitle">Track how much you've saved by buying games on sale</p>

            <!-- Total Savings Card -->
            <div class="savings-summary">
                <div class="summary-card">
                    <div class="summary-icon">💰</div>
                    <div class="summary-content">
                        <div class="summary-label">Total Saved</div>
                        <div class="summary-value" id="total-savings">₹0</div>
                    </div>
                </div>
                <div class="summary-card equivalent-games">
                    <div class="summary-icon">🎮</div>
                    <div class="summary-content">
                        <div class="summary-label">Equivalent Free Games</div>
                        <div class="summary-message" id="equivalent-games">Loading...</div>
                    </div>
                </div>
            </div>

            <!-- Log Purchase Form -->
            <div class="log-purchase-card">
                <h3>Log a Purchase</h3>
                <form id="purchase-form" class="purchase-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="game-title">Game Title</label>
                            <input type="text" id="game-title" name="game_title" required placeholder="Enter game title">
                        </div>
                        <div class="form-group">
                            <label for="paid-price">Price You Paid (₹)</label>
                            <input type="number" id="paid-price" name="paid_price" required min="0" placeholder="0">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="original-price">Original Price (₹)</label>
                            <input type="number" id="original-price" name="original_price" required min="0" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label for="game-id">Game ID (optional)</label>
                            <input type="number" id="game-id" name="game_id" placeholder="Game ID from database">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Log Purchase</button>
                </form>
            </div>

            <!-- Monthly Breakdown -->
            <div class="monthly-breakdown">
                <h3>Monthly Savings Breakdown</h3>
                <div id="monthly-chart" class="monthly-chart">
                    <!-- Monthly bars will be populated here -->
                </div>
            </div>

            <!-- Purchase History -->
            <div class="purchase-history">
                <h3>Purchase History</h3>
                <div id="purchase-history-list" class="purchase-list">
                    <!-- Purchase items will be populated here -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/savings.js"></script>
</body>
</html>
