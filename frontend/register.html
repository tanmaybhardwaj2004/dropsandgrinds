<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DropsAndGrinds</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <header class="app-header">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">DropsAndGrinds</a></div>
    </header>

    <main class="container auth-container">
        <div class="auth-card">
            <h2>Create an Account</h2>
            <p class="auth-subtitle">Start tracking your wishlist</p>
            
            <div id="auth-error" class="alert error hidden"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="player@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="8" placeholder="Must be at least 8 characters">
                </div>
                <div class="form-group">
                    <label for="steamId">Steam ID (Optional)</label>
                    <input type="text" id="steamId" name="steam_id" placeholder="e.g. 76561198000000000">
                    <span class="help-text">Used for importing your library (public ID only, no login required)</span>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="consentAlerts" name="consent_alerts" checked>
                    <label for="consentAlerts">I consent to receiving email alerts when a game price drops.</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="consentAnalytics" name="consent_analytics" checked>
                    <label for="consentAnalytics">I consent to anonymous click tracking to improve deal algorithms.</label>
                </div>
                
                <button type="submit" class="btn btn-primary full-width" id="register-btn">Create Account</button>
            </form>
            
            <p class="auth-footer">Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
