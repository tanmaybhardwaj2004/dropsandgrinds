<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Time to Buy - DropsAndGrinds</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/buy-timing.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">DropsAndGrinds</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">Deals</a>
                <a href="library.html" class="nav-link">Library</a>
                <a href="wishlist.html" class="nav-link">Wishlist</a>
                <a href="savings.html" class="nav-link">Savings</a>
                <a href="bundle.html" class="nav-link">Bundle Breaker</a>
                <a href="buy-timing.html" class="nav-link active">Best Time to Buy</a>
            </nav>
            <div class="auth-buttons">
                <button id="login-btn" class="btn btn-primary">Login</button>
                <button id="logout-btn" class="btn btn-secondary" style="display: none;">Logout</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="buy-timing-section">
            <h2 class="section-title">Best Time to Buy</h2>
            <p class="section-subtitle">Check sale calendar and get buy recommendations for any game</p>

            <div class="game-search-card">
                <div class="form-group">
                    <label for="game-id">Game ID</label>
                    <input type="number" id="game-id" placeholder="Enter game ID" class="game-id-input">
                </div>
                <button id="check-timing-btn" class="btn btn-primary">Check Buy Timing</button>
            </div>

            <div id="loading-state" class="loading-state" style="display: none;">
                <div class="spinner"></div>
                <p>Checking buy timing...</p>
            </div>

            <div id="recommendation-card" class="recommendation-card" style="display: none;">
                <div id="recommendation-banner" class="recommendation-banner"></div>
                <div class="recommendation-details">
                    <div class="detail-item">
                        <div class="detail-label">Recommendation</div>
                        <div class="detail-value" id="recommendation-text">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Reason</div>
                        <div class="detail-value" id="recommendation-reason">-</div>
                    </div>
                    <div class="detail-item" id="days-until-item" style="display: none;">
                        <div class="detail-label">Days Until Sale</div>
                        <div class="detail-value" id="days-until">-</div>
                    </div>
                </div>
            </div>

            <div class="sales-calendar-section">
                <h3>Sales Calendar</h3>
                <div id="sales-calendar" class="sales-calendar">
                    <!-- Sales will be populated here -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/buy-timing.js"></script>
</body>
</html>
