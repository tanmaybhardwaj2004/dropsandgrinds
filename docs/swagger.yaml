basePath: /
definitions:
  models.APIError:
    properties:
      error:
        example: Invalid credentials
        type: string
    type: object
  models.LoginRequest:
    properties:
      email:
        example: player@example.com
        type: string
      password:
        example: strongpassword123
        type: string
    required:
    - email
    - password
    type: object
  models.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    required:
    - refresh_token
    type: object
  models.RegisterRequest:
    properties:
      consent_alerts:
        example: true
        type: boolean
      consent_analytics:
        example: true
        type: boolean
      email:
        example: player@example.com
        type: string
      password:
        example: strongpassword123
        minLength: 8
        type: string
      steam_id:
        example: "76561198000000000"
        type: string
    required:
    - email
    - password
    type: object
  models.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5c...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      user_id:
        example: 1
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: Smart Cross-Platform Game Deal Tracker (India-Focused)
  title: DropsAndGrinds API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Validates credentials and returns short-lived JWT + refresh token
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIError'
      summary: Log in to account
      tags:
      - auth
  /api/auth/logout:
    post:
      description: Invalidates the current refresh token in backend storage (Redis)
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            type: string
      summary: Log out
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Validates a refresh token and rotates it for a new JWT pair
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIError'
      summary: Refresh Access Token
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new DropsAndGrinds account, saving GDPR consent and optionally
        a SteamID
      parameters:
      - description: Registration info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIError'
      summary: Register a new user
      tags:
      - auth
  /health:
    get:
      description: Check if the server is running
      produces:
      - application/json
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Health Check
      tags:
      - system
swagger: "2.0"
